services:
  postgres:
    image: postgres:15-alpine
    container_name: accounting_db
    environment:
      POSTGRES_DB: accounting_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - accounting_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    networks:
      - accounting_net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: accounting_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=accounting_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - prometheus
    networks:
      - accounting_net
    restart: unless-stopped

networks:
  accounting_net:
    driver: bridge

volumes:
  pgdata:
  promdata: