global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'host-vm'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          instance: 'main-host'
          environment: 'development'
      - targets: ['192.168.1.14:9100']
        labels:
          instance: 'test-vm-01'
          environment: 'development'