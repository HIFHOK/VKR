global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # 🔥 ИЗМЕНЕНО: file_sd_configs вместо static_configs
  - job_name: 'host-vm'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/*.json'
        refresh_interval: 30s
    relabel_configs:
      # 🔥 Убрали правило, которое перезаписывало instance!
      # Теперь instance берётся из JSON-файла, как мы и задумали
      - target_label: environment
        replacement: 'development'